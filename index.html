<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

}

.container{

    width:100%;
    text-align:center;

}

.banner{

    width:500px;
    height:500px;
    margin:auto;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0px 15px 40px rgba(0,0,0,.4);

}

.banner img{

    width:100%;
    height:100%;
    object-fit:cover;

}

.button-area{

    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;

}

.btn{

    text-decoration:none;
    padding:15px 45px;
    border-radius:50px;
    color:white;
    font-size:18px;
    font-weight:bold;
    transition:.3s;

}

.btn1{

    background:#FFD700;

}

.btn2{

    background:#00C853;

}

.btn3{

    background:#2196F3;

}

.btn:hover{

    transform:translateY(-5px);
    box-shadow:0px 10px 25px rgba(255,255,255,.2);

}

@media(max-width:600px){

.banner{

width:90%;
height:auto;

}

.banner img{

height:auto;

}

.button-area{

flex-direction:column;
align-items:center;

}

.btn{

width:250px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="banner">

<img src="banner.png" alt="Banner">

</div>

<div class="button-area">

<a href="https://ganglembu.org/jkyq" class="btn btn1">DAFTAR</a>

<a href="https://ganglembu.org/jkyq" class="btn btn2">LOGIN</a>

<a href="https://direct.lc.chat/15020553" class="btn btn3">HUBUNGIN KAMI</a>

</div>

</div>

</body>
</html>
